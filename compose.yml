services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://gr:password@db:5432/genshin_roles
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      ENKA_USER_AGENT: ${ENKA_USER_AGENT:-GenshinRoles/1.0}
      BASE_URL: ${BASE_URL}
      LISTEN_ADDR: "0.0.0.0:8080"
      AUTH_GATEWAY_URL: ${AUTH_GATEWAY_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  db:
    image: postgres:16-alpine
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c max_connections=15
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
    environment:
      POSTGRES_DB: genshin_roles
      POSTGRES_USER: gr
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: '64m'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gr -d genshin_roles"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  db-backup:
    image: postgres:16-alpine
    restart: always
    depends_on:
      - db
    volumes:
      - ./backups:/backups
      - /tmp:/var/lib/postgresql/data
    environment:
      PGPASSWORD: password
    entrypoint: |
      bash -c '
      while true; do
        echo "[$(date)] Running database backup..."
        pg_dump -h db -U gr genshin_roles | gzip > /backups/genshin_roles-$(date +%F_%H-%M-%S).sql.gz
        echo "[$(date)] Backup complete."
        find /backups -type f -mtime +7 -delete
        sleep 24h
      done
      '

  backup-sync:
    image: instrumentisto/rsync-ssh:latest
    restart: always
    depends_on:
      - db-backup
    volumes:
      - ./backups:/backups:ro
    environment:
      VPS_HOST: ${VPS_HOST}
      VPS_USER: ${VPS_USER}
      VPS_PASS: ${VPS_PASS}
      VPS_BACKUP_DIR: ${VPS_BACKUP_DIR:-/root/genshin-roles-backups}
    entrypoint: |
      sh -c '
      apk add --no-cache sshpass
      while true; do
        echo "[$(date)] Starting backup sync to VPS..."
        sshpass -p "$$VPS_PASS" ssh -o StrictHostKeyChecking=no "$$VPS_USER@$$VPS_HOST" "mkdir -p $$VPS_BACKUP_DIR"
        sshpass -p "$$VPS_PASS" rsync -avz \
          -e "ssh -o StrictHostKeyChecking=no" \
          /backups/ \
          "$$VPS_USER@$$VPS_HOST:$$VPS_BACKUP_DIR/"
        if [ $$? -eq 0 ]; then
          echo "[$(date)] Backup sync completed successfully."
        else
          echo "[$(date)] Backup sync failed!"
        fi
        sleep 6h
      done
      '

volumes:
  pgdata:
